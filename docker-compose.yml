version: '3.8'

services:
  collectible-vault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collectible-vault-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/vault.db
      - OLLAMA_HOST=http://ollama-vision:11434
      - OLLAMA_MODEL=qwen2-vl
      - EBAY_CLIENT_ID=${EBAY_CLIENT_ID}
      - EBAY_CLIENT_SECRET=${EBAY_CLIENT_SECRET}
    volumes:
      - vault-data:/app/data
      - ./uploads:/app/uploads
    networks:
      - vault-network

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collectible-vault-mcp
    restart: unless-stopped
    command: python mcp_server.py
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:///./data/vault.db
      - EBAY_CLIENT_ID=${EBAY_CLIENT_ID}
      - EBAY_CLIENT_SECRET=${EBAY_CLIENT_SECRET}
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
    volumes:
      - vault-data:/app/data
      - ./uploads:/app/uploads
    networks:
      - vault-network

  ollama-vision:
    image: ollama/ollama:latest
    container_name: collectible-vault-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - vault-network

networks:
  vault-network:
    driver: bridge

volumes:
  vault-data:
  ollama-models:
